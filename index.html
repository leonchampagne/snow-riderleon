<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Rider - Gift Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="game-container">
            <div class="game-info">
                <div class="score-display">
                    <div class="label">SCORE</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="gifts-display">
                    <div class="label">GIFTS</div>
                    <div class="value" id="gifts">0</div>
                </div>
                <div class="level-display">
                    <div class="label">LEVEL</div>
                    <div class="value" id="level">1</div>
                </div>
            </div>
            
            <canvas id="gameCanvas"></canvas>
            
            <div id="startMenu" class="menu">
                <h1>SNOW RIDER</h1>
                <h2>🎁 Gift Edition 🎁</h2>
                <p>Collect gifts and avoid obstacles!</p>
                <button onclick="startGame()">START GAME</button>
                <div class="instructions">
                    <p>← → or A/D to move</p>
                </div>
            </div>
            
            <div id="gameOverMenu" class="menu hidden">
                <h1>GAME OVER</h1>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">SCORE</span>
                        <span class="stat-value" id="finalScore">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">GIFTS</span>
                        <span class="stat-value" id="finalGifts">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">LEVEL</span>
                        <span class="stat-value" id="finalLevel">1</span>
                    </div>
                </div>
                <button onclick="restartGame()">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
